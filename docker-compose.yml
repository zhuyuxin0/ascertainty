# Ascertainty backend stack — runs on a Docker + nginx VPS. The host's
# nginx (port 80/443) reverse-proxies api.ascertainty.xyz → 127.0.0.1:8000
# here; Let's Encrypt cert via certbot --nginx. Caddy NOT used because
# nginx already owns the public ports.
#
# Usage on the VPS:
#   1. Place .env beside this file (NEVER commit; same env keys as the
#      local dev .env).
#   2. docker compose up -d --build
#   3. tail logs: docker compose logs -f api

services:
  api:
    build: .
    image: ascertainty-api:latest
    container_name: ascertainty_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    # Bind to loopback only — nginx on the host proxies inbound traffic.
    # Prevents accidental direct public exposure on :8000.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
