bounty_id: sort-correctness-001
description: |
  Prove that the merge-sort implementation in the reference module returns
  a permutation of its input that is monotonically non-decreasing under the
  provided ordering, for any input list.
theorem_signature: |
  ∀ {α : Type} [inst : LinearOrder α] (xs : List α),
    let ys := mergeSort xs
    (∀ i j, i < j → j < ys.length → ys.get ⟨i, by omega⟩ ≤ ys.get ⟨j, by omega⟩) ∧
    ys.Perm xs
