bounty_id: heat-equation-pinn-convergence-001
description: |
  Prove that the physics-informed neural network (PINN) approximation
  u_θ(x, t) for the 1D heat equation u_t = α·u_xx on [0, 1] × [0, T],
  with initial condition u(x, 0) = sin(πx) and Dirichlet boundary
  u(0, t) = u(1, t) = 0, achieves L²-error bounded by ε for any ε > 0
  given a network of width >= W(ε) and training loss <= δ(ε).
theorem_signature: |
  ∀ (ε : ℝ) (hε : 0 < ε), ∃ (W : ℕ) (δ : ℝ),
    0 < δ ∧
    ∀ (θ : NN.Params) (h_train : NN.loss θ ≤ δ) (h_width : NN.width θ ≥ W),
      ‖uExact - uApprox θ‖_L2 ≤ ε
