# nginx server block for api.ascertainty.xyz
# Place at /etc/nginx/sites-available/ascertainty on the VPS, symlink
# to /etc/nginx/sites-enabled/ascertainty, then `sudo nginx -t && sudo systemctl reload nginx`.
# Cert is obtained via `certbot --nginx -d api.ascertainty.xyz`, which
# rewrites this file to add the SSL listener + cert paths automatically.

server {
    listen 80;
    listen [::]:80;
    server_name api.ascertainty.xyz;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE friendly (CCTP watcher uses websockets internally
        # but the API itself doesn't expose any; future-proofing in case
        # we add an SSE race-events stream).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long-poll friendly
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
    }
}
